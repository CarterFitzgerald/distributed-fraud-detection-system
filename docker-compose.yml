services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  bootstrap:
    build:
      context: .
      dockerfile: docker/bootstrap.Dockerfile
    container_name: bootstrap
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TransactionDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;Encrypt=False"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

  transactionservice:
    build:
      context: .
      dockerfile: TransactionService/Dockerfile
    container_name: transactionservice
    ports:
      - "5134:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TransactionDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  fraudworker:
    build:
      context: .
      dockerfile: FraudDetectionWorker/Dockerfile
    container_name: fraudworker
    working_dir: /app
    volumes:
      - .:/workspace:ro
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TransactionDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      FraudModel__ModelPath: "/workspace/FraudModelTrainer.OptionA/Model/model.zip"
      FraudModel__ModelVersion: "OptionA_LightGBM_v2"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully